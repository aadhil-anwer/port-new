title: Aadhil Anwar
description: "Security engineer specializing in network security, vulnerability research, and API exploitation. Currently at GoDaddy working on infrastructure security, access control architecture, and cloud security on AWS."
url: "https://aadhilanwar.github.io"
baseurl: ""

# Author (used by jekyll-seo-tag for JSON-LD Person schema)
author:
  name: Aadhil Anwar
  url: "https://aadhilanwar.github.io"
  twitter: z3r0din

# Social profiles (used by jekyll-seo-tag for sameAs in JSON-LD)
social:
  name: Aadhil Anwar
  links:
    - https://github.com/aadhil-anwer
    - https://in.linkedin.com/in/aadhilanwer
    - https://x.com/z3r0din

# Twitter card config
twitter:
  username: z3r0din
  card: summary

# Default OG image for social shares
defaults:
  - scope:
      path: ""
    values:
      image: /images/og-default.png
  - scope:
      path: "_posts"
      type: posts
    values:
      layout: post
      type: blog
  - scope:
      path: "_writeups"
      type: writeups
    values:
      layout: post
      type: writeup

permalink: /blog/:slug/

collections:
  writeups:
    output: true
    permalink: /writeups/:slug/

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - js/avatar.js
  - images/character.glb
  - images/char_enviorment.hdr
